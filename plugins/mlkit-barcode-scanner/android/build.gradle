apply plugin: 'com.android.library'

android {
    namespace "com.kasir.mlkitbarcode"
    compileSdk rootProject.ext.compileSdkVersion ?: 36

    defaultConfig {
        minSdk rootProject.ext.minSdkVersion ?: 24
        targetSdk rootProject.ext.targetSdkVersion ?: 36
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

dependencies {
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.getcapacitor:capacitor-android:0.0.0"

    // ML Kit Barcode Scanning
    implementation 'com.google.mlkit:barcode-scanning:17.2.0'
    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
    implementation "androidx.camera:camera-view:1.3.4"
    implementation "androidx.lifecycle:lifecycle-runtime:2.8.4"
    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"
}
